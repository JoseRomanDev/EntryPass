server {
    listen 80;
    server_name localhost;

    # ==================================================
    # 1. Backend (API Symfony) - Proxy a PHP-FPM
    # ==================================================
    # Cualquier peticion que empiece por /api ira a PHP-FPM
    location /api {
        root /var/www/html/public;
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        root /var/www/html/public;
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    # Bloquear acceso a otros archivos .php por seguridad
    location ~ \.php$ {
        return 404;
    }

    # ==================================================
    # 2. Frontend (Angular SPA) - Archivos estaticos
    # ==================================================
    # Nginx sirve directamente los archivos compilados por ng build
    # En vez de hacer proxy a un servidor de desarrollo (ng serve)
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # Clave para SPA: si el archivo no existe, redirigir a index.html
        # Esto permite que Angular maneje el routing del lado del cliente
        try_files $uri $uri/ /index.html;
    }

    # ==================================================
    # 3. Cache de archivos estaticos
    # ==================================================
    # Angular genera archivos con hash en el nombre (ej: main.abc123.js)
    # Podemos cachearlos agresivamente porque si cambian, cambia el hash
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    error_log /var/log/nginx/project_error.log;
    access_log /var/log/nginx/project_access.log;
}
