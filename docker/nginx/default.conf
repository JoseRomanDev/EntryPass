server {
    listen 80;
    server_name localhost;

    # 1. Backend (API Symfony)
    # Cualquier peticion que empiece por /api ira a PHP-FPM
    location /api {
        root /var/www/html/public;
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        root /var/www/html/public;
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    # Bloquear acceso a otros archivos .php por seguridad
    location ~ \.php$ {
        return 404;
    }

    # 2. Frontend (Angular SPA)
    # Por defecto todo el trafico base va al servidor de desarrollo de Angular
    location / {
        proxy_pass http://node:4200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Necesario para WebSockets (Hot Module Replacement de Angular)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    error_log /var/log/nginx/project_error.log;
    access_log /var/log/nginx/project_access.log;
}