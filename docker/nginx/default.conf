server {
    listen 80;
    server_name localhost;
    root /var/www/html/public; # Symfony guarda su punto de entrada en /public

    location / {
        # Intentar servir el archivo directamente, si no existe, pasar a Symfony
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000; # Envía la petición al contenedor 'php'
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    # Bloquear acceso a otros archivos .php por seguridad
    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/project_error.log;
    access_log /var/log/nginx/project_access.log;
}