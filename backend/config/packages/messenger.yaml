framework:
    messenger:
        failure_transport: failed

        transports:
            async: '%env(MESSENGER_TRANSPORT_DSN)%'
            failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        routing:
            'App\Application\Command\PurchaseTicketCommand':    sync
            'App\Application\Message\SendPurchaseEmailMessage': async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
