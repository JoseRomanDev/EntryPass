<div class="auth-page">
  <div class="auth-card card fade-in-up">
    <div class="auth-header">
      <img src="logo.png" alt="EntryPass Logo" class="brand-logo-auth">
      <h1 class="heading-lg">Bienvenido de nuevo</h1>
      <p class="text-body">Accede a tu cuenta de EntryPass</p>
    </div>

    @if (error()) {
      <div class="auth-error">{{ error() }}</div>
    }

    <form class="auth-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          id="email"
          type="email"
          class="input"
          placeholder="tu@email.com"
          [(ngModel)]="email"
          name="email"
          required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div style="position: relative;">
          <input
            id="password"
            [type]="showPassword() ? 'text' : 'password'"
            class="input"
            style="padding-right: 40px;"
            placeholder="••••••••"
            [(ngModel)]="password"
            name="password"
            required>
          <button 
            type="button"
            aria-label="Alternar visibilidad de contraseña" 
            (click)="togglePassword()" 
            style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: color 0.2s ease;">
            
            @if (showPassword()) {
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            } @else {
              <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            }
          </button>
        </div>
      </div>

      <button
        type="submit"
        class="btn btn-primary auth-submit"
        [disabled]="loading()">
        @if (loading()) {
          Iniciando sesión...
        } @else {
          Iniciar Sesión
        }
      </button>
    </form>

    <p class="auth-footer-text">
      ¿No tienes una cuenta?
      <a routerLink="/auth/register" class="auth-link">Regístrate</a>
    </p>
  </div>
</div>
