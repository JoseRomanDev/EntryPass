<div class="form-container">
  <div class="form-header">
    <a routerLink="/admin/events" class="back-link">← Volver al Panel</a>
    <h1>{{ isEditing() ? 'Editar Evento' : 'Crear Nuevo Evento' }}</h1>
    <p class="subtitle">Asegúrate de revisar todos los campos antes de guardar los cambios.</p>
  </div>

  <div class="loading-state" *ngIf="isLoading()">
    <div class="spinner"></div>
    <p>Cargando datos del evento...</p>
  </div>

  <div class="error-banner" *ngIf="error()">
    <span class="icon">⚠</span>
    {{ error() }}
  </div>

  <form *ngIf="!isLoading()" (ngSubmit)="onSubmit()" #eventForm="ngForm" class="admin-form">
    
    <div class="form-grid">
      <!-- Title -->
      <div class="form-group span-full">
        <label for="title">Título del Evento *</label>
        <input 
          type="text" 
          id="title" 
          name="title"
          class="input"
          [ngModel]="eventData().title" 
          (ngModelChange)="eventData().title = $event"
          required
          minlength="3"
          placeholder="Ej: Festival Indie Madrid 2026">
      </div>

      <!-- Date -->
      <div class="form-group span-half">
        <label for="date">Fecha y Hora *</label>
        <input 
          type="datetime-local" 
          id="date" 
          name="date"
          class="input"
          [ngModel]="eventData().date" 
          (ngModelChange)="eventData().date = $event"
          required>
      </div>

      <!-- Status -->
      <div class="form-group span-half form-group-toggle">
        <label for="status">Estado de visibilidad pública</label>
        <div class="toggle-container" (click)="eventData().status = !eventData().status">
          <div class="toggle-switch" [class.active]="eventData().status"></div>
          <span class="toggle-label">{{ eventData().status ? 'Público' : 'Oculto' }}</span>
        </div>
      </div>

      <!-- Capacity -->
      <div class="form-group span-half">
        <label for="capacity">Aforo Total *</label>
        <input 
          type="number" 
          id="capacity" 
          name="capacity"
          class="input"
          [ngModel]="eventData().capacity" 
          (ngModelChange)="eventData().capacity = $event"
          required
          min="1"
          placeholder="Ej: 500">
      </div>

      <!-- Price -->
      <div class="form-group span-half">
        <label for="price">Precio por Entrada (€) *</label>
        <input 
          type="number" 
          id="price" 
          name="price"
          class="input"
          [ngModel]="eventData().price" 
          (ngModelChange)="eventData().price = $event"
          required
          min="0"
          step="0.01"
          placeholder="Ej: 25.50">
      </div>

      <!-- Description -->
      <div class="form-group span-full">
        <label for="description">Descripción Detallada</label>
        <textarea 
          id="description" 
          name="description"
          class="input textarea"
          [ngModel]="eventData().description" 
          (ngModelChange)="eventData().description = $event"
          rows="5"
          placeholder="Describe el evento, las normas, si incluye consumición..."></textarea>
      </div>
    </div>

    <div class="form-actions">
      <a routerLink="/admin/events" class="btn btn-ghost" *ngIf="!isSaving()">Cancelar</a>
      <button 
        type="submit" 
        class="btn btn-primary btn-save" 
        [disabled]="!eventForm.form.valid || isSaving()">
        <span *ngIf="!isSaving()">{{ isEditing() ? 'Actualizar Evento' : 'Publicar Evento' }}</span>
        <span *ngIf="isSaving()" class="spinner-small"></span>
        <span *ngIf="isSaving()">Guardando...</span>
      </button>
    </div>
    
  </form>
</div>
