<header class="navbar">
  <div class="container navbar-container">
    <!-- Logo -->
    <a routerLink="/" class="brand">
      <img src="logo.png" alt="EntryPass Logo" class="brand-logo">
    </a>

    <!-- Mobile Toggle -->
    <button class="mobile-toggle" (click)="toggleMenu()" aria-label="Abrir menú">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>

    <!-- Actions -->
    <div class="nav-actions" [class.active]="isMenuOpen()">
      @if (isAuthenticated()) {
        @if (isAdmin()) {
          <a routerLink="/admin/events" class="nav-link admin-brand" (click)="closeMenu()">⭐ Panel de Gestión</a>
        }
        <a routerLink="/profile" class="nav-link" (click)="closeMenu()">Mi Perfil</a>
        <button class="btn btn-ghost" (click)="logout(); closeMenu()">Cerrar Sesión</button>
      } @else {
        <a routerLink="/auth/login" class="nav-link" (click)="closeMenu()">Iniciar Sesión</a>
        <a routerLink="/auth/register" class="btn btn-primary btn-sm register-btn" (click)="closeMenu()">Registrarse</a>
      }
    </div>
  </div>
</header>
